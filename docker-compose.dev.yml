# Dev-only: just Postgres. The Next.js dev server runs on your host via `npm run dev`.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d   # start Postgres
#   docker compose -f docker-compose.dev.yml down     # stop it
#   docker compose -f docker-compose.dev.yml down -v  # stop + wipe data

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flashcards
    ports:
      - "5432:5432"
    volumes:
      - flashcards_dev_data:/var/lib/postgresql/data

volumes:
  flashcards_dev_data: